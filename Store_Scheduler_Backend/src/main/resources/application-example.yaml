spring:
  application:
    name: Store_Scheduler_Backend

  datasource:
    url: jdbc:postgresql://localhost:5432/scheduler_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  # 영문/숫자/특수문자 조합 32자 이상의 시크릿 키를 지정하세요
  secret: ${JWT_SECRET}
  # 토큰 만료 시간 (밀리초, 예: 3600000 = 1시간)
  expiration_time: 3600000
